; Gumtar Guitar Controller — PlatformIO configuration
; Two build environments:
;   hid   — standard HID gamepad (PC/Mac/PS3)
;   xinput — Xbox 360 XInput (requires XInput USB core, see docs/HARDWARE.md)

[platformio]
default_envs = hid

[env:hid]
platform = atmelavr
board = sparkfun_promicro16
framework = arduino
lib_deps =
    fastled/FastLED@^3.6.0
    bblanchon/ArduinoJson@^6.21.0
build_flags =
    -DUSB_VID=0x12BA
    -DUSB_PID=0x0100
    -DUSB_MANUFACTURER='"Gumtar"'
    -DUSB_PRODUCT='"Guitar Controller"'
monitor_speed = 115200

[env:xinput]
; NOTE: This environment requires the ArduinoXInput USB core to be installed.
; Follow the instructions in the ArduinoXInput library README before building.
platform = atmelavr
board = sparkfun_promicro16
framework = arduino
lib_deps =
    fastled/FastLED@^3.6.0
    bblanchon/ArduinoJson@^6.21.0
    dmadison/ArduinoXInput@^1.2.3
build_flags =
    -DXINPUT_MODE
    -DUSB_MANUFACTURER='"Gumtar"'
    -DUSB_PRODUCT='"Guitar Controller"'
monitor_speed = 115200
