; Gumtar Guitar Controller — PlatformIO configuration
; Target board: Raspberry Pi Pico (RP2040)
;
; Two build environments:
;   hid    — standard HID gamepad (PC/Mac/PS3)  [default]
;   xinput — Xbox 360 XInput (see docs/HARDWARE.md for ArduinoXInput_Pico requirements)

[platformio]
default_envs = hid

[env:hid]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico
framework = arduino
board_build.core = earlephilhower
board_build.filesystem_size = 0.5m
lib_deps =
    adafruit/Adafruit TinyUSB Library@^3.1.5
    fastled/FastLED@^3.6.0
    bblanchon/ArduinoJson@^6.21.0
build_flags =
    -DUSE_TINYUSB
    -DUSB_VID=0x12BA   ; Guitar Hero Les Paul PS3 VID — see docs/HARDWARE.md
    -DUSB_PID=0x0100
    -DUSB_MANUFACTURER='"Gumtar"'
    -DUSB_PRODUCT='"Guitar Controller"'
monitor_speed = 115200

[env:xinput]
; NOTE: XInput on RP2040 requires the ArduinoXInput_Pico library.
; Follow the instructions in docs/HARDWARE.md before building this environment.
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico
framework = arduino
board_build.core = earlephilhower
board_build.filesystem_size = 0.5m
lib_deps =
    https://github.com/dmadison/ArduinoXInput_Pico.git
    fastled/FastLED@^3.6.0
    bblanchon/ArduinoJson@^6.21.0
build_flags =
    -DXINPUT_MODE
    -DUSB_MANUFACTURER='"Gumtar"'
    -DUSB_PRODUCT='"Guitar Controller"'
monitor_speed = 115200
